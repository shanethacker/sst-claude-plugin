name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog:** $CHANGELOG

categories:
  - title: "⚠️ Breaking Changes"
    labels:
      - "breaking"
  - title: "🚀 Features"
    labels:
      - "feature"
  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
  - title: "📚 Documentation"
    labels:
      - "docs"
  - title: "🔧 Maintenance"
    labels:
      - "chore"
      - "ci"
      - "build"
      - "refactor"
      - "performance"

exclude-labels:
  - "skip-changelog"

version-resolver:
  major:
    labels:
      - "breaking"
  minor:
    labels:
      - "feature"
  patch:
    labels:
      - "fix"
      - "docs"
      - "chore"
      - "ci"
      - "build"
      - "refactor"
      - "performance"
  default: patch

autolabeler:
  - label: "breaking"
    title:
      - '/^breaking(\(.+\))?!?:/i'
  - label: "feature"
    title:
      - '/^feat(\(.+\))?!?:/i'
  - label: "fix"
    title:
      - '/^fix(\(.+\))?!?:/i'
  - label: "docs"
    title:
      - '/^docs(\(.+\))?:/i'
  - label: "chore"
    title:
      - '/^chore(\(.+\))?:/i'
  - label: "ci"
    title:
      - '/^ci(\(.+\))?:/i'
  - label: "build"
    title:
      - '/^build(\(.+\))?:/i'
  - label: "refactor"
    title:
      - '/^refactor(\(.+\))?:/i'
  - label: "performance"
    title:
      - '/^perf(\(.+\))?:/i'
